<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeuralFlick</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 68px);
        }

        .login-container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-login {
            background-color: #f5c518;
            color: black;
        }

        .btn-signup {
            background-color: #333;
            color: white;
            border: 1px solid #555;
        }

        #auth-message {
            margin-top: 15px;
            font-size: 0.9em;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.8em;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>

<body style="padding-top:90px;">
<nav style="position:fixed!important;top:0;left:0;right:0;width:100%;height:68px;background:rgba(10,10,10,0.96);border-bottom:1px solid rgba(255,255,255,0.08);display:flex!important;align-items:center;justify-content:space-between;padding:0 32px;z-index:9999;box-sizing:border-box;">
    <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-weight:800;font-size:1.2rem;">🎬 Neural<span style="color:#f5c518;">Flick</span></a>
    <ul style="display:flex!important;flex-direction:row!important;align-items:center;gap:6px;list-style:none!important;margin:0;padding:0;">
        <li style="list-style:none!important;margin:0;padding:0;"><a href="/" style="color:#aaa;text-decoration:none;font-size:0.9rem;font-weight:500;padding:8px 14px;border-radius:8px;">🏠 Home</a></li>
        <li style="list-style:none!important;margin:0;padding:0;"><a href="/community" style="color:#aaa;text-decoration:none;font-size:0.9rem;font-weight:500;padding:8px 14px;border-radius:8px;">🌍 Community</a></li>
        <li style="list-style:none!important;margin:0;padding:0;"><a href="/about" style="color:#aaa;text-decoration:none;font-size:0.9rem;font-weight:500;padding:8px 14px;border-radius:8px;">ℹ️ About</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:12px;"></div>
</nav>
<div class="login-wrapper">
    <div class="login-container">
        <h2>🎬 Login</h2>

        <input type="text" id="name" placeholder="Full Name (Compulsory for Sign Up!)">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button class="btn-login" onclick="handleLogin()">Login</button>
        <button class="btn-signup" onclick="handleSignUp()">Sign Up</button>

        <p id="auth-message"></p>

        <a href="/" class="back-link">← Back to Movies</a>
    </div> <!-- /.login-container -->

</div> <!-- /.login-wrapper -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Use Jinja2 to inject config
        const supabaseUrl = "{{ supabase_url }}";
        const supabaseKey = "{{ supabase_key }}";

        let supabaseClient = null;
        try {
            if (!supabaseUrl || !supabaseKey || supabaseUrl.includes("None") || supabaseKey.includes("None")) {
                throw new Error("Missing Supabase Config");
            }
            supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        } catch (err) {
            console.error("Supabase Init Failed", err);
            document.getElementById("auth-message").innerText = "System Error: Config Missing";
            document.getElementById("auth-message").style.color = "red";
        }

        async function handleLogin() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const msg = document.getElementById("auth-message");

            msg.innerText = "Logging in...";
            msg.style.color = "#888";

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password,
            });

            if (error) {
                msg.innerText = error.message;
                msg.style.color = "red";
            } else {
                msg.innerText = "Success! Redirecting...";
                msg.style.color = "#0f0";
                setTimeout(() => window.location.href = "/", 1000);
            }
        }

        async function handleSignUp() {
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const msg = document.getElementById("auth-message");

            if (!name) {
                msg.innerText = "Error: Full Name is required to register! ⚠️";
                msg.style.color = "red";
                return;
            }

            msg.innerText = "Signing up...";
            msg.style.color = "#888";

            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        full_name: name
                    }
                }
            });

            if (error) {
                msg.innerText = error.message;
                msg.style.color = "red";
            } else {
                if (data.session) {
                    msg.innerText = "Success! Redirecting...";
                    msg.style.color = "#0f0";
                    setTimeout(() => window.location.href = "/", 1000);
                } else {
                    msg.innerText = "Check your email for confirmation!";
                    msg.style.color = "#f5c518";
                }
            }
        }
    </script>
</body>

</html>
